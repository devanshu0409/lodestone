name: Build installers

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

# The release step creates a GitHub Release on tag pushes; the default
# workflow token is read-only, so grant it write on repo contents.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: macos
          - os: windows-latest
            script: dist:win
            artifact: windows
          - os: ubuntu-latest
            script: dist
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      # Icon rasters are committed; regenerate locally with `npm run make-icons`
      # if build/icon.svg changes.
      - run: npm run ${{ matrix.script }}
        env:
          # Unsigned builds; provide CSC_LINK / CSC_KEY_PASSWORD (mac) or
          # WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD (win) to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

      # Tag pushes (v*) also attach the artifacts to a GitHub Release.
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/latest*.yml
